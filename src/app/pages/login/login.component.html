<!doctype html>
<div class="min-h-screen w-full flex items-center justify-center relative overflow-hidden px-6">
  <div class="absolute inset-0 z-0">
    <img src="https://images.unsplash.com/photo-1555529771-835f59fc5efe?auto=format&fit=crop&q=80" class="w-full h-full object-cover" alt="Atelier de couture moderne">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
  </div>

  <div class="relative z-10 max-w-md w-full bg-white/90 backdrop-blur-md rounded-[3rem] shadow-2xl p-10 border border-white/20">
    <div class="text-center mb-10">
      <div class="w-14 h-14 bg-rose-500 rounded-2xl flex items-center justify-center shadow-lg shadow-rose-200 mx-auto mb-4">
        <span class="text-white font-bold text-2xl">T</span>
      </div>
      <h2 class="text-3xl font-serif text-gray-900 italic">TaylorSoft</h2>
      <p class="text-gray-500 mt-2 font-medium italic uppercase tracking-widest text-xs">Atelier Digital</p>
    </div>

    <form class="space-y-5" (ngSubmit)="onSubmit()">
      <div class="group">
        <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-2 tracking-wider">Identifiant</label>
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          aria-label="Adresse email"
          placeholder="votre@email.com"
          class="w-full p-4 bg-white border borders-gray-100 rounded-2xl outline-none focus:ring-2 ring-rose-500 transition-all shadow-sm">
      </div>

      <div class="group">
        <div class="flex justify-between mb-2 px-2">
          <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Mot de passe</label>
          <a href="#" class="text-xs text-rose-500 font-bold hover:underline">Oublié ?</a>
        </div>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          aria-label="Mot de passe"
          placeholder="••••••••"
          class="w-full p-4 bg-white border border-gray-100 rounded-2xl outline-none focus:ring-2 ring-rose-500 transition-all shadow-sm">
      </div>
      <div *ngIf="errorMessage" class="text-red-500 text-sm px-2">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full py-4 bg-rose-500 text-white rounded-2xl font-bold text-lg hover:bg-rose-600 shadow-xl shadow-rose-200 transition-all transform active:scale-95 mt-4 disabled:opacity-60 disabled:cursor-not-allowed">
        {{ loading() ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <div class="text-center mt-8">
      <p class="text-gray-500 text-sm">
        Nouveau parmi nous ?
        <a href="#" class="text-rose-600 font-extrabold hover:underline ml-1">S'inscrire</a>
      </p>
    </div>
  </div>
</div>
